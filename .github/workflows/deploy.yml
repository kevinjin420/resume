name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: latexmk texlive-latex-base texlive-latex-extra texlive-fonts-recommended
          version: 1.0
          execute_install_scripts: true

      - name: Compile LaTeX
        run: latexmk -pdf -interaction=nonstopmode -file-line-error Resume_Shengran_Jin.tex Resume_Shengran_Jin_Systems.tex

      - name: Assemble site
        run: |
          mkdir -p _site/systems
          cp Resume_Shengran_Jin.pdf _site/resume.pdf
          cp Resume_Shengran_Jin_Systems.pdf _site/systems/resume.pdf
          echo "resume.kevinjin.dev" > _site/CNAME

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
