name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v4
        with:
          root_file: |
            Resume_Shengran_Jin.tex
            Resume_Shengran_Jin_Systems.tex
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Assemble site
        run: |
          mkdir -p _site/systems
          cp Resume_Shengran_Jin.pdf _site/resume.pdf
          cp Resume_Shengran_Jin_Systems.pdf _site/systems/resume.pdf
          echo "resume.kevinjin.dev" > _site/CNAME

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
